version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - mice_hotels_db_data_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mice_hotels
    ports:
      - '5433:5432' # Exposing on 5433 to avoid conflicts with dev db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - '80:80' 
      - '443:443' # For future SSL
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mice_hotels_db_data_prod:
    driver: local
